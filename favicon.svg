<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5F6D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)" />
  
  <!-- Inner lighter circle -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8" />
  
  <!-- Multiplication symbol (×) -->
  <text x="50" y="65" font-size="48" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">×</text>
  
  <!-- Numbers 2 and 3 small in corners -->
  <text x="25" y="35" font-size="16" font-weight="bold" fill="white" font-family="Arial, sans-serif">2</text>
  <text x="70" y="70" font-size="16" font-weight="bold" fill="white" font-family="Arial, sans-serif">3</text>
</svg>