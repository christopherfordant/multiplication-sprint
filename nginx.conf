# Configuration Nginx pour Multiplication Sprint
# Sécurisée avec HTTPS, compression et headers de sécurité

upstream nodejs_backend {
  server localhost:3000;
}

# Redirection HTTP vers HTTPS
server {
  listen 80;
  server_name multiplication-sprint.com www.multiplication-sprint.com;
  return 301 https://$server_name$request_uri;
}

# Configuration HTTPS principale
server {
  listen 443 ssl http2;
  server_name multiplication-sprint.com www.multiplication-sprint.com;

  # Certificats SSL
  ssl_certificate /etc/letsencrypt/live/multiplication-sprint.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/multiplication-sprint.com/privkey.pem;

  # Sécurité SSL/TLS
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Compression
  gzip on;
  gzip_types text/plain text/css text/xml text/javascript 
             application/x-javascript application/javascript application/json 
             application/xml+rss image/svg+xml;
  gzip_min_length 1000;
  gzip_proxied any;

  # 🔒 Headers de sécurité
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # CSP Header
  add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data:;
    connect-src 'self';
    media-src 'self';
    object-src 'none';
  " always;

  # 📁 Fichiers statiques
  location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    root /var/www/multiplication-sprint;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # 🤖 Fichiers SEO
  location ~ /robots\.txt$ {
    root /var/www/multiplication-sprint;
    expires 30d;
  }

  location ~ /sitemap\.xml$ {
    root /var/www/multiplication-sprint;
    expires 30d;
  }

  # 📄 Index par défaut
  location / {
    root /var/www/multiplication-sprint;
    try_files $uri $uri/ /index.html;
    expires -1;
  }

  # 🎮 API Backend
  location /api/ {
    proxy_pass http://nodejs_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeout pour les requêtes
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Logs
  access_log /var/log/nginx/multiplication-sprint.access.log;
  error_log /var/log/nginx/multiplication-sprint.error.log;
}
